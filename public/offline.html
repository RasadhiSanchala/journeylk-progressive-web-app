<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JourneyLK Offline</title>

    <style>
      :root {
        --background: #1f2937;
        --card: #ffffff;
        --text: #e5e7eb;
        --muted: #cbd5e1;
        --primary: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .offline {
        width: min(90%, 360px);
        text-align: center;
        padding: 32px 24px;
      }

      .logo {
        width: 96px;
        height: 96px;
        border-radius: 999px;
        background: var(--card);
        padding: 12px;
        margin-bottom: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .hint {
        margin-top: 24px;
        font-size: 13px;
        color: #94a3b8;
      }
    </style>
  </head>

  <body>
    <main class="offline">
      <img class="logo" src="/icons/icon-192.png" alt="JourneyLK logo" />
      <h1>You’re offline</h1>
      <p>
        JourneyLK needs an internet connection to load destinations, images, and
        map directions.
      </p>
      <p class="hint">Reconnect to the internet and open the app again.</p>
    </main>
  </body>
</html>
